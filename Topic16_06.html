<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

textarea {
  width: 100%;
  min-height: 80px;
  font-family: monospace;
  overflow: hidden;
  resize: none;
  box-sizing: border-box;
  line-height: 1.5;
}

button {
  padding: 10px;
  margin-top: 10px;
}

#output {
  background: black;
  color: lime;
  padding: 10px;
  white-space: pre-wrap;
  min-height: 120px;
}
</style>
</head>

<body>

<h3>Python Code</h3>

<textarea id="code">
import pandas as pd
import matplotlib.pyplot as plt

sales_df = pd.read_csv('sales.csv')

print(sales_df.head())
</textarea>

<br>
<button onclick="runCode()">▶ Run Code</button>

<h4>Output</h4>
<div id="output">Loading Python...</div>

<script>
let pyodide;

// ✅ Hidden CSV data
let data1 = `Date,Region,Category,Product,Sales,Profit
2023-10-17,South,Furniture,Chair,1226,206
2023-10-18,East,Furniture,Desk,1559,30
2023-10-19,West,Electronic,Lamp,960,321
2023-10-20,South,Furniture,Chair,2331,400
2023-10-21,East,Furniture,Chair,1226,401
2023-10-22,West,Furniture,Desk,1452,562
2023-10-23,South,Furniture,Chair,1226,320`;


// ✅ Auto-resize
function autoResize(textarea) {
  textarea.style.height = "auto";
  requestAnimationFrame(() => {
    textarea.style.height = textarea.scrollHeight + "px";
  });
}

// ✅ Initialize Pyodide
async function init() {
  pyodide = await loadPyodide();

  // Load CSV into virtual filesystem
  pyodide.FS.writeFile("sales.csv", data1);

  document.getElementById("output").textContent = "✅ Python Ready!";

  const textarea = document.getElementById("code");

  autoResize(textarea);
  setTimeout(() => autoResize(textarea), 50);

  textarea.addEventListener("input", function () {
    autoResize(this);
  });
}

init();


// ✅ Load required packages
async function loadPackages(code) {
  let output = document.getElementById("output");

  // pandas
  if (code.includes("pandas") && !pyodide.loadedPackages["pandas"]) {
    output.textContent = "Loading pandas...";
    await pyodide.loadPackage("pandas");
  }

  // matplotlib (IMPORTANT FIX)
  if (
    (code.includes("matplotlib") || code.includes("plt.") || code.includes(".plot(")) &&
    !pyodide.loadedPackages["matplotlib"]
  ) {
    output.textContent = "Loading matplotlib...";
    await pyodide.loadPackage("matplotlib");
  }
}


// ✅ Run code
async function runCode() {
  let output = document.getElementById("output");
  let code = document.getElementById("code").value;

  output.textContent = "Preparing environment...";

  try {
    await loadPackages(code);

    // Capture print()
    pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
sys.stderr = StringIO()
`);

    await pyodide.runPythonAsync(code);

    let printed = pyodide.runPython(`
sys.stdout.getvalue() + sys.stderr.getvalue()
`);

    output.textContent = printed;

  } catch (err) {
    output.textContent = "❌ Error:\\n" + err;
  }
}
</script>

</body>
</html>
