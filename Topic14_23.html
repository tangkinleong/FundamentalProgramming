<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

textarea {
  width: 100%;
  min-height: 100px;
  font-family: monospace;
  overflow: hidden;
  resize: none;
  box-sizing: border-box;
}

button {
  padding: 10px;
  margin-top: 10px;
}

#output {
  background: black;
  color: lime;
  padding: 10px;
  white-space: pre-wrap;
}

/* ✅ Table styling */
table {
  border-collapse: collapse;
  margin-top: 10px;
  background: white;
  color: black;
}
th, td {
  border: 1px solid #ccc;
  padding: 5px 10px;
}
</style>
</head>

<body>

<textarea id="code">
import pandas as pd

df_score = pd.read_csv('student_scores3.csv', index_col='StudentID')
df_group = pd.read_csv('student_group.csv', index_col='StudentID')

res3 = df_score.join(df_group)

res3.to_html()
</textarea>

<br>
<button onclick="runCode()">▶ Run Code</button>

<h4>Output</h4>
<div id="output">Loading Python...</div>

<script>
let pyodide;

// ✅ SAMPLE DATA (replace with your real data if needed)
let data_scores = `StudentID,Name,Age,Subject,Score,Grade
ID001,Alice,15,Math,95,A
ID002,Bob,16,Science,88,B
ID003,Charlie,15,English,92,A
ID004,Diana,17,Math,78,C
ID005,Ethan,16,Science,85,B
ID006,Fiona,15,History,89,B
ID007,George,17,Math,91,A
ID008,Hannah,16,English,75,C`;

let data_group = `StudentID,Study Group,Mentor
ID001,1,Mr Bean
ID002,2,Ms Kristine
ID003,1,Mr Bean
ID004,2,Ms Kristine
ID005,1,Mr Bean
ID006,2,Ms Kristine
ID007,1,Mr Bean
ID008,2,Ms Kristine`;


// ✅ AUTO RESIZE
function autoResize(textarea) {
  textarea.style.height = "auto";
  textarea.style.height = textarea.scrollHeight + "px";
}

// ✅ INIT
async function init() {
  pyodide = await loadPyodide();

  // inject CSV files
  pyodide.FS.writeFile("student_scores3.csv", data_scores);
  pyodide.FS.writeFile("student_group.csv", data_group);

  document.getElementById("output").textContent = "✅ Python Ready!";

  let textarea = document.getElementById("code");
  autoResize(textarea);

  textarea.addEventListener("input", () => autoResize(textarea));
}

init();


// ✅ LOAD PACKAGES
async function loadPackages(code) {
  let output = document.getElementById("output");

  if (code.includes("pandas") && !pyodide.loadedPackages["pandas"]) {
    output.textContent = "Loading pandas...";
    await pyodide.loadPackage("pandas");
  }
}


// ✅ RUN CODE
async function runCode() {
  let output = document.getElementById("output");
  let code = document.getElementById("code").value;

  output.textContent = "Running...";

  try {
    await loadPackages(code);

    pyodide.runPython(`
import sys
from io import StringIO

sys.stdout = StringIO()
sys.stderr = StringIO()
`);

    await pyodide.runPythonAsync(code);

    let result = pyodide.runPython(`
sys.stdout.getvalue() + sys.stderr.getvalue()
`);

    // ✅ IMPORTANT: render HTML (table)
    output.innerHTML = result;

  } catch (err) {
    output.textContent = "❌ Error:\\n" + err;
  }
}
</script>

</body>
</html>
