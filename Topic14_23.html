<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

textarea {
  width: 100%;
  min-height: 80px;
  font-family: monospace;
  overflow: hidden;
  resize: none;
  box-sizing: border-box;
  line-height: 1.5;
}

button {
  padding: 10px;
  margin-top: 10px;
}

#output {
  background: black;
  color: lime;
  padding: 10px;
  white-space: pre-wrap;
  min-height: 120px;
}
</style>
</head>

<body>

<textarea id="code">
import pandas as pd
df_score = pd.read_csv('student_scores3.csv', index_col='StudentID')
df_group = pd.read_csv('student_group.csv', index_col='StudentID')
res3 = df_score.join(df_group)
res3.to_html()
</textarea>

<br>
<button onclick="runCode()">▶ Run Code</button>

<h4>Output</h4>
<div id="output">Loading Python...</div>

<script>
let pyodide;

// ✅ Hidden CSV 1
let data1 = 'Name,Age,Subject,Score,Grade
Alice,15,Math,95,A
Bob,16,Science,88,B
Charlie,15,English,92,A
Diana,17,Math,78,C
Ethan,16,Science,85,B
Fiona,15,History,89,B
George,17,Math,91,A
Hannah,16,English,75,C';

let data2 = 'StudentID,Study Group,Mentor
ID001,1,Mr Bean
ID002,2,Ms Kristine
ID003,1,Mr Bean
ID004,2,Ms Kristine
ID005,1,Mr Bean
ID006,2,Ms Kristine
ID007,1,Mr Bean
ID008,2,Ms Kristine';

// ✅ Auto resize
function autoResize(textarea) {
  textarea.style.height = "auto";
  requestAnimationFrame(() => {
    textarea.style.height = textarea.scrollHeight + "px";
  });
}

// ✅ Init
async function init() {
  pyodide = await loadPyodide();

  // ✅ Inject BOTH CSVs
  pyodide.FS.writeFile("student_scores3.csv", data1);
  pyodide.FS.writeFile("student_group.csv", data2);

  document.getElementById("output").textContent = "✅ Python Ready!";

  const textarea = document.getElementById("code");

  autoResize(textarea);
  setTimeout(() => autoResize(textarea), 50);

  textarea.addEventListener("input", function () {
    autoResize(this);
  });
}
init();

// ✅ Load packages
async function loadPackages(code) {
  let output = document.getElementById("output");

  if (code.includes("pandas") && !pyodide.loadedPackages["pandas"]) {
    output.textContent = "Loading pandas...";
    await pyodide.loadPackage("pandas");
  }
}

// ✅ Run code
async function runCode() {
  let output = document.getElementById("output");
  let code = document.getElementById("code").value;

  output.innerHTML = "Preparing environment...";

  try {
    await loadPackages(code);

    // Capture print()
    pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

    let result = await pyodide.runPythonAsync(code);
    let printed = pyodide.runPython("sys.stdout.getvalue()");

    // ✅ Correct HTML detection
    if (result && result.toString().trim().startsWith("<")) {
      output.innerHTML = "<pre>" + printed + "</pre>" + result;
    } else {
      output.textContent = printed;
    }

  } catch (err) {
    output.textContent = "❌ Error:\\n" + err;
  }
}
</script>

</body>
</html>
