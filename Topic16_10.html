<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

textarea {
  width: 100%;
  min-height: 80px;
  font-family: monospace;
  overflow: hidden;
  resize: none;
  box-sizing: border-box;
  line-height: 1.5;
}

button {
  padding: 10px;
  margin-top: 10px;
}

#output {
  background: black;
  color: lime;
  padding: 10px;
}

#plot img {
  max-width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<textarea id="code">
import pandas as pd
import matplotlib.pyplot as plt

sales_df = pd.read_csv('sales.csv')

plt.figure(figsize=(8, 5))
plt.scatter(sales_df['Sales'], sales_df['Profit'],
            alpha=0.6, color='purple')

plt.title('Sales vs Profit')
plt.xlabel('Sales')
plt.ylabel('Profit')

plt.tight_layout()
plt.show()
</textarea>

<br>
<button onclick="runCode()">▶ Run Code</button>

<h4>Output</h4>
<div id="output">Loading Python...</div>
<div id="plot"></div>

<script>
let pyodide;

// ✅ AUTO RESIZE
function autoResize(textarea) {
  textarea.style.height = "auto";
  textarea.style.height = textarea.scrollHeight + "px";
}

// ✅ DATASET (keep your full dataset here if needed)
let data1 = `Date,Region,Category,Product,Sales,Profit
2023-10-01,North,Electronics,Laptop,1450,520
2023-10-01,South,Furniture,Chair,820,180
2023-10-01,East,Clothing,Shirt,560,120
2023-10-01,West,Food,Bread,300,50
2023-10-02,North,Electronics,Phone,1800,600
2023-10-02,South,Furniture,Table,1340,250
2023-10-02,East,Clothing,Jacket,980,220
2023-10-02,West,Food,Milk,400,70`;

// ✅ INIT
async function init() {
  pyodide = await loadPyodide();
  pyodide.FS.writeFile("sales.csv", data1);

  document.getElementById("output").textContent = "✅ Python Ready!";

  let textarea = document.getElementById("code");

  // ✅ Resize on load
  autoResize(textarea);

  // ✅ Resize on typing
  textarea.addEventListener("input", () => autoResize(textarea));
}

init();


// ✅ LOAD PACKAGES
async function loadPackages(code) {
  let output = document.getElementById("output");

  if (code.includes("pandas") && !pyodide.loadedPackages["pandas"]) {
    output.textContent = "Loading pandas...";
    await pyodide.loadPackage("pandas");
  }

  if (
    (code.includes("matplotlib") || code.includes("plt.") || code.includes(".plot(")) &&
    !pyodide.loadedPackages["matplotlib"]
  ) {
    output.textContent = "Loading matplotlib...";
    await pyodide.loadPackage("matplotlib");
  }
}


// ✅ RUN CODE
async function runCode() {
  let output = document.getElementById("output");
  let plot = document.getElementById("plot");
  let code = document.getElementById("code").value;

  output.textContent = "Running...";
  plot.innerHTML = "";

  try {
    await loadPackages(code);

    // ✅ Capture output + reset plot
    pyodide.runPython(`
import sys
from io import StringIO
import matplotlib.pyplot as plt

sys.stdout = StringIO()
sys.stderr = StringIO()
plt.close('all')
`);

    await pyodide.runPythonAsync(code);

    let printed = pyodide.runPython(`
sys.stdout.getvalue() + sys.stderr.getvalue()
`);

    // ✅ CAPTURE PLOT IMAGE
    let img = pyodide.runPython(`
import matplotlib.pyplot as plt
import io, base64

if plt.get_fignums():
    buf = io.BytesIO()
    plt.savefig(buf, format='png')
    buf.seek(0)
    base64.b64encode(buf.read()).decode()
else:
    ""
`);

    output.textContent = printed;

    // ✅ SHOW IMAGE
    if (img) {
      plot.innerHTML = "<img src='data:image/png;base64," + catch (err) {
    output.textContent = "❌ Error:\\n" + err;
  }
}
</script>

</body>
</html>
