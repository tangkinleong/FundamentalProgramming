<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

textarea {
  width: 100%;
  min-height: 80px;
  font-family: monospace;
  overflow: hidden;
  resize: none;
  box-sizing: border-box;
  line-height: 1.5;
}

button {
  padding: 10px;
  margin-top: 10px;
}

#output {
  background: black;
  color: lime;
  padding: 10px;
  white-space: pre-wrap;
  min-height: 120px;
}

#plot img {
  max-width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<h3>Python Code</h3>

<textarea id="code">
import pandas as pd
import matplotlib.pyplot as plt

sales_df = pd.read_csv('sales.csv')

plt.figure(figsize=(8, 5))
plt.hist(sales_df['Sales'], bins=20, color='orange', edgecolor='black')

plt.title('Distribution of Sales')
plt.xlabel('Sales')
plt.ylabel('Frequency')

plt.tight_layout()
plt.show()
</textarea>

<br>
<button onclick="runCode()">▶ Run Code</button>

<h4>Output</h4>
<div id="output">Loading Python...</div>
<div id="plot"></div>

<script>
let pyodide;

// ✅ DATASET
let data1 = `Date,Region,Category,Product,Sales,Profit
2023-10-01,North,Electronics,Laptop,1450,520
2023-10-01,South,Furniture,Chair,820,180
2023-10-01,East,Clothing,Shirt,560,120
2023-10-01,West,Food,Bread,300,50
2023-10-02,North,Electronics,Phone,1800,600
2023-10-02,South,Furniture,Table,1340,250
2023-10-02,East,Clothing,Jacket,980,220
2023-10-02,West,Food,Milk,400,70
2023-10-03,North,Electronics,Tablet,1100,300
2023-10-03,South,Furniture,Sofa,1600,420
2023-10-03,East,Clothing,Shoes,900,190
2023-10-03,West,Food,Eggs,250,40`;

// ✅ AUTO RESIZE
function autoResize(textarea) {
  textarea.style.height = "auto";
  textarea.style.height = textarea.scrollHeight + "px";
}

// ✅ INIT
async function init() {
  pyodide = await loadPyodide();

  // Load CSV
  pyodide.FS.writeFile("sales.csv", data1);

  document.getElementById("output").textContent = "✅ Python Ready!";

  const textarea = document.getElementById("code");
  autoResize(textarea);

  textarea.addEventListener("input", function () {
    autoResize(this);
  });
}

init();


// ✅ LOAD PACKAGES
async function loadPackages(code) {
  let output = document.getElementById("output");

  if (code.includes("pandas") && !pyodide.loadedPackages["pandas"]) {
    output.textContent = "Loading pandas...";
    await pyodide.loadPackage("pandas");
  }

  if (
    (code.includes("matplotlib") || code.includes("plt.") || code.includes(".plot(")) &&
    !pyodide.loadedPackages["matplotlib"]
  ) {
    output.textContent = "Loading matplotlib...";
    await pyodide.loadPackage("matplotlib");
  }
}


// ✅ RUN CODE
async function runCode() {
  let output = document.getElementById("output");
  let plotDiv = document.getElementById("plot");

  let code = document.getElementById("code").value;

  output.textContent = "Preparing environment...";
  plotDiv.innerHTML = "";

  try {
    await loadPackages(code);

    // Capture output + reset plots
    pyodide.runPython(`
import sys
from io import StringIO
import matplotlib.pyplot as plt

sys.stdout = StringIO()
sys.stderr = StringIO()
plt.close('all')
`);

    await pyodide.runPythonAsync(code);

    let printed = pyodide.runPython(`
sys.stdout.getvalue() + sys.stderr.getvalue()
`);

    // ✅ Get plot image
    let img = pyodide.runPython(`
import matplotlib.pyplot as plt
import io, base64

if plt.get_fignums():
    buf = io.BytesIO()
    plt.savefig(buf, format='png')
    buf.seek(0)
    base64.b64encode(buf.read()).decode()
else:
    ""
`);

    output.textContent = printed;

    // ✅ Show plot
    if (img) {
      plotDiv.innerHTML = "<img src='data:image/png;base64," + imgput.textContent = "❌ Error:\\n" + err;
  }
}
</script>

</body>
</html>
