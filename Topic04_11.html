<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.jstyle>
body { font-family: Arial; margin: 20px; }

textarea {
  width: 100%;
  min-height: 80px;
  font-family: monospace;
}

#output {
  background: black;
  color: lime;
  padding: 10px;
  white-space: pre-wrap;
  min-height: 100px;
}
</style>
</head>

<body>

<!-- ✅ USER INPUT -->
<input type="text" id="nameInput" placeholder="Enter your name">

<!-- ✅ PYTHON CODE -->
<textarea id="code">
name = input("Please enter your name: ")
print("Hey there, " + name + ", I hope you're doing great!")
</textarea>

<br><br>
<button onclick="runCode()">▶ Run Code</button>

<h4>Output</h4>
<div id="output">Loading...</div>

<script>
let pyodide;

async function init() {
  pyodide = await loadPyodide();
  document.getElementById("output").textContent = "✅ Python Ready!";
}
init();


// ✅ RUN CODE
async function runCode() {
  let output = document.getElementById("output");
  let code = document.getElementById("code").value;
  let nameValue = document.getElementById("nameInput").value;

  try {
    // ✅ Capture print()
    pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

    // ✅ OVERRIDE input()
    pyodide.globals.set("user_input_value", nameValue);

    pyodide.runPython(`
import builtins
builtins.input = lambda prompt="": user_input_value
`);

    // ✅ Run user code
    await pyodide.runPythonAsync(code);

    let result = pyodide.runPython("sys.stdout.getvalue()");
    output.textContent = result;

  } catch (err) {
    output.textContent = "❌ Error:\n" + err;
  }
}
</script>

</body>
</html>
