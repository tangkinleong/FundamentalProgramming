<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">


<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; margin: 20px; }
textarea { width: 100%; height: 200px; }
#output { background: black; color: lime; padding: 10px; }
</style>
</head>

<body>



<textarea id="code">

import pandas as pd
shopping_list = pd.Series(['Apples', 'Bananas', 'Milk', 'Bread'])
print(shopping_list)


</textarea>

<br>
<button onclick="runCode()">▶ Run Code</button>

<h3>Output</h3>
<div id="output">Loading Python...</div>

<script>
let pyodide;

// ✅ SIMPLE INIT (NO heavy packages)
async function init() {
  pyodide = await loadPyodide();
  document.getElementById("output").textContent = "✅ Ready!";
}
init();

// ✅ RUN CODE
async function runCode() {
  let output = document.getElementById("output");

  output.textContent = "Running...";

  try {
    pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

    let code = document.getElementById("code").value;

    await pyodide.runPythonAsync(code);

    let result = pyodide.runPython("sys.stdout.getvalue()");
    output.textContent = result;

  } catch (err) {
    output.textContent = err;
  }
}
</script>

</body>
</html>
