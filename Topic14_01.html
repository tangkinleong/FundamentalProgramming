<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stable Pyodide Template</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; margin: 20px; }
textarea { width: 100%; height: 200px; }
button { padding: 10px; margin-top: 10px; }

#output {
  background: black;
  color: lime;
  padding: 10px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<h2>Python Interactive Code</h2>

<textarea id="code">
import pandas as pd
print(pd.Series([1,2,3]))
</textarea>

<br>
<button id="runBtn" onclick="runCode()" disabled>▶ Run Code</button>

<h3>Output</h3>
<div id="output">⏳ Initializing...</div>

<script>
let pyodide;
let ready = false;

// ✅ LOAD EVERYTHING FIRST
async function init() {
  let out = document.getElementById("output");

  try {
    out.textContent = "Loading Pyodide...";
    pyodide = await loadPyodide();

    out.textContent = "Loading pandas & matplotlib...";
    await pyodide.loadPackage(["pandas", "matplotlib"]);

    out.textContent = "Installing seaborn...";
    await pyodide.loadPackage("micropip");

    await pyodide.runPythonAsync(`
import micropip
await micropip.install("seaborn")
`);

    ready = true;

    out.textContent = "✅ Ready! Click Run";
    document.getElementById("runBtn").disabled = false;

  } catch (err) {
    out.textContent = "❌ Failed to load:\\n" + err;
    console.error(err);
  }
}

init();


// ✅ RUN BUTTON
async function runCode() {
  let output = document.getElementById("output");

  if (!ready) {
    output.textContent = "⏳ Still loading...";
    return;
  }

  output.textContent = "Running...";

  try {
    // capture output
    pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

    let code = document.getElementById("code").value;

    await pyodide.runPythonAsync(code);

    let result = pyodide.runPython("sys.stdout.getvalue()");
    output.textContent = result;

  } catch (err) {
    output.textContent = "❌ Error:\\n" + err;
  }
}
</script>

</body>
</html>
``
