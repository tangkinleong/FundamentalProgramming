<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

textarea {
  width: 100%;
  min-height: 80px;
  font-family: monospace;
}

button {
  padding: 10px;
  margin-top: 10px;
}

#output {
  background: black;
  color: lime;
  padding: 10px;
  white-space: pre-wrap;
  min-height: 120px;
}
</style>
</head>

<body>

<textarea id="code">
import pandas as pd

shopping_list = pd.Series(['Apples', 'Bananas', 'Milk', 'Bread'])

print("This is normal print output:\n")
print(shopping_list)

print("\nNow display as table:")

shopping_list.to_frame(name="Items").to_html()
</textarea>

<br>
<button onclick="runCode()">▶ Run Code</button>

<h4>Output</h4>
<div id="output">Loading Python...</div>

<script>
let pyodide;

// ✅ INIT
async function init() {
    pyodide = await loadPyodide();
    document.getElementById("output").textContent = "✅ Python Ready!";
}
init();

// ✅ LOAD PACKAGES
async function loadPackages(code) {
    if (code.includes("pandas") && !pyodide.loadedPackages["pandas"]) {
        document.getElementById("output").textContent = "Loading pandas...";
        await pyodide.loadPackage("pandas");
    }
}

// ✅ RUN CODE
async function runCode() {
    let output = document.getElementById("output");
    let code = document.getElementById("code").value;

    try {
        await loadPackages(code);

        // Capture print()
        pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

        // Run user code
        let result = await pyodide.runPythonAsync(code);

        // Get print output
        let printed = pyodide.runPython("sys.stdout.getvalue()");

        // ✅ Detect HTML (table)
        if (result && result.toString().trim().startsWith("<")) {
            output.innerHTML = printed + result;   // print + table
        } else {
            output.textContent = printed;
        }

    } catch (err) {
        output.textContent = "❌ Error:\\n" + err;
    }
}
</script>

</body>
</html>
