<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">


<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; margin: 20px; }
textarea { width: 100%; height: 220px; font-family: monospace; }
button { padding: 10px; margin-top: 10px; }

#output {
  background: black;
  color: lime;
  padding: 10px;
  white-space: pre-wrap;
  min-height: 120px;
}

#plot img {
  max-width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>



<textarea id="code">
import pandas as pd
print(pd.Series([1,2,3]))
</textarea>

<br>
<button id="runBtn" onclick="runCode()" disabled>▶ Run Code</button>

<h3>Output</h3>
<div id="output">Initializing Python...</div>
<div id="plot"></div>

<script>
let pyodide;

// ✅ INIT: LOAD EVERYTHING SAFELY
async function init() {
  pyodide = await loadPyodide();

  let out = document.getElementById("output");

  try {
    out.textContent = "Loading pandas & matplotlib...";
    await pyodide.loadPackage(["pandas", "matplotlib"]);

    out.textContent = "Installing seaborn...";
    await pyodide.loadPackage("micropip");

    await pyodide.runPythonAsync(`
import micropip
await micropip.install("seaborn")
`);

    out.textContent = "✅ Ready!";

    // ✅ Enable button only after ALL done
    document.getElementById("runBtn").disabled = false;

  } catch (err) {
    out.textContent = "❌ Failed to load environment:\\n" + err;
  }
}

init();


// ✅ RUN CODE FUNCTION
async function runCode() {
  let output = document.getElementById("output");
  let plot = document.getElementById("plot");

  output.textContent = "Running...";
  plot.innerHTML = "";

  try {
    // ✅ Reset output
    pyodide.runPython(`
import sys
from io import StringIO
import matplotlib.pyplot as plt

sys.stdout = StringIO()
sys.stderr = StringIO()
plt.close('all')
`);

    let code = document.getElementById("code").value;

    await pyodide.runPythonAsync(code);

    // ✅ Show text output
    let text = pyodide.runPython(`
sys.stdout.getvalue() + sys.stderr.getvalue()
`);
    output.textContent = text;

    // ✅ Show plot if any
    let img = pyodide.runPython(`
import matplotlib.pyplot as plt
import io, base64

if plt.get_fignums():
    buf = io.BytesIO()
    plt.savefig(buf, format="png")
    buf.seek(0)
    base64.b64encode(buf.read()).decode()
else:
    ""
`);

    if (img) {
      plot.innerHTML = "<img src='data:image/png;base64," + img + "'rr) {
    output.textContent = "❌ Error:\\n" + err;
  }
}
</script>

</body>
</html>
``
