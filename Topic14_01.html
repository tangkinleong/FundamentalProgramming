<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">


<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

textarea {
  width: 100%;
  min-height: 150px;
  font-family: monospace;
  overflow: hidden;   /* ✅ remove scrollbar */
  resize: none;       /* ✅ disable manual resize */
}

button {
  padding: 10px;
  margin-top: 10px;
}

#output {
  background: black;
  color: lime;
  padding: 10px;
  white-space: pre-wrap;
  min-height: 120px;
}
</style>
</head>

<body>


<textarea id="code" oninput="autoResize(this)">
import pandas as pd
shopping_list = pd.Series(['Apples', 'Bananas', 'Milk', 'Bread'])
print(shopping_list)
</textarea>

<br>
<button onclick="runCode()">▶ Run Code</button>

<h3>Output</h3>
<div id="output">Loading Python...</div>

<script>
let pyodide;

// ✅ Auto-resize function
function autoResize(textarea) {
  textarea.style.height = "auto";
  textarea.style.height = textarea.scrollHeight + "px";
}

// ✅ Initialize Python (FAST)
async function init() {
  pyodide = await loadPyodide();

  document.getElementById("output").textContent = "✅ Python Ready!";
  
  // resize textbox on load
  autoResize(document.getElementById("code"));
}
init();


// ✅ Load packages only when needed
async function loadPackages(code) {
  let output = document.getElementById("output");

  if (code.includes("pandas") && !pyodide.loadedPackages["pandas"]) {
    output.textContent = "Loading pandas...";
    await pyodide.loadPackage("pandas");
  }

  if (code.includes("matplotlib") && !pyodide.loadedPackages["matplotlib"]) {
    output.textContent = "Loading matplotlib...";
    await pyodide.loadPackage("matplotlib");
  }

  if (code.includes("seaborn")) {
    output.textContent = "Loading seaborn...";

    if (!pyodide.loadedPackages["micropip"]) {
      await pyodide.loadPackage("micropip");
    }

    await pyodide.runPythonAsync(`
import micropip
await micropip.install("seaborn")
`);
  }
}


// ✅ Run button
async function runCode() {
  let output = document.getElementById("output");

  let code = document.getElementById("code").value;

  output.textContent = "Preparing environment...";

  try {
    // ✅ Load required libraries dynamically
    await loadPackages(code);

    // ✅ Capture output
    pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

    await pyodide.runPythonAsync(code);

    let result = pyodide.runPython("sys.stdout.getvalue()");
    output.textContent = result;

  } catch (err) {
    output.textContent = "❌ Error:\n" + err;
  }
}
</script>

</body>
</html>
