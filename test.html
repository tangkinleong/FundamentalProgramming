<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Python Interactive Demo</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; margin: 20px; }
textarea { width: 100%; height: 220px; font-family: monospace; }
button { padding: 10px; margin-top: 10px; }

#output {
  background: black;
  color: lime;
  padding: 10px;
  white-space: pre-wrap;
  min-height: 120px;
}

#plot img {
  margin-top: 10px;
  max-width: 100%;
}
</style>
</head>

<body>

<h2>Python Code</h2>

<textarea id="code">
import pandas as pd

data = pd.Series(['Apples', 'Bananas', 'Milk', 'Bread'])
print(data)
</textarea>

<br>
<button onclick="runCode()">▶ Run Code</button>

<h3>Output</h3>
<div id="output">Loading...</div>

<div id="plot"></div>

<script>
let pyodide;
let ready = false;

// ✅ Initialize Pyodide + packages
async function init() {
  pyodide = await loadPyodide();

  document.getElementById("output").textContent = "Loading packages...";

  await pyodide.loadPackage(["pandas", "matplotlib", "micropip"]);

  await pyodide.runPythonAsync(`
import micropip
await micropip.install("seaborn")
`);

  ready = true;
  document.getElementById("output").textContent = "✅ Ready! Click Run Code.";
}

init();

// ✅ Run Code Button
async function runCode() {
  let output = document.getElementById("output");
  let plot = document.getElementById("plot");

  if (!ready) {
    output.textContent = "⏳ Still loading...";
    return;
  }

  output.textContent = "Running...";
  plot.innerHTML = "";

  try {
    // Capture print output
    pyodide.runPython(`
import sys
from io import StringIO
import matplotlib.pyplot as plt

sys.stdout = StringIO()
plt.close('all')
`);

    let code = document.getElementById("code").value;

    // Run user code
    await pyodide.runPythonAsync(code);

    // Get printed output
    let result = pyodide.runPython("sys.stdout.getvalue()");
    output.textContent = result;

    // Capture plot (if exists)
    let img = pyodide.runPython(`
import matplotlib.pyplot as plt
import io, base64

if plt.get_fignums():
    buf = io.BytesIO()
    plt.savefig(buf, format='png')
    buf.seek(0)
    base64.b64encode(buf.read()).decode('utf-8')
else:
    None
`);

  }
}
</script>

</body>
</html>
