<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pyodide Lecture Template</title>

<!-- ✅ Load Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

textarea {
  width: 100%;
  height: 220px;
  font-family: monospace;
}

button {
  padding: 10px;
  margin-top: 10px;
}

#output {
  background: black;
  color: lime;
  padding: 10px;
  white-space: pre-wrap;
  min-height: 120px;
}

#plot img {
  max-width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>Python Interactive Code</h2>

<textarea id="code">
import pandas as pd
print(pd.Series([1,2,3]))
</textarea>

<br>
<button onclick="runCode()">▶ Run Code</button>

<h3>Output</h3>
<div id="output">Loading Python...</div>

<div id="plot"></div>

<script>
let pyodide;
let ready = false;

// ✅ INITIALIZE ENVIRONMENT (RUN ONCE)
async function init() {
  pyodide = await loadPyodide();

  document.getElementById("output").textContent = "Loading packages...";

  // ✅ Load core packages
  await pyodide.loadPackage(["pandas", "matplotlib"]);

  // ✅ Install seaborn (only once)
  await pyodide.loadPackage("micropip");
  await pyodide.runPythonAsync(`
import micropip
await micropip.install("seaborn")
`);

  ready = true;
  document.getElementById("output").textContent = "✅ Ready!";
}

init();


// ✅ RUN BUTTON FUNCTION
async function runCode() {
  let output = document.getElementById("output");
  let plot = document.getElementById("plot");

  if (!ready) {
    output.textContent = "⏳ Still loading...";
    return;
  }

  output.textContent = "Running...";
  plot.innerHTML = "";

  try {
    // ✅ Capture print output safely
    pyodide.runPython(`
import sys
from io import StringIO

sys.stdout = StringIO()
sys.stderr = StringIO()

import matplotlib.pyplot as plt
plt.close('all')
`);

    let code = document.getElementById("code").value;

    // ✅ Run user code
    await pyodide.runPythonAsync(code);

    // ✅ Get output + errors
    let text = pyodide.runPython(`
sys.stdout.getvalue() + sys.stderr.getvalue()
`);
    output.textContent = text;

    // ✅ Render matplotlib plot if exists
    let img = pyodide.runPython(`
import matplotlib.pyplot as plt
import io, base64

if plt.get_fignums():
    buf = io.BytesIO()
    plt.savefig(buf, format="png")
    buf.seek(0)
    base64.b64encode(buf.read()).decode()
else:
    ""
`);

    if (img) {
      plot.innerHTML = "<img src='data:image/png;base64," + img + (err) {
    output.textContent = "❌ Error:\\n" + err;
  }
}
</script>

</body>
</html>
