<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

textarea {
  width: 100%;
  min-height: 80px;
  font-family: monospace;
  overflow: hidden;
  resize: none;
  box-sizing: border-box;
  line-height: 1.5;
}

button {
  padding: 10px;
  margin-top: 10px;
}

#output {
  background: black;
  color: lime;
  padding: 10px;
  white-space: pre-wrap;
  min-height: 120px;
}
</style>
</head>

<body>

<textarea id="code">
import pandas as pd
prices = pd.Series([2.50, 5.00, 8.90], name="Item Price (RM)") 

print("Normal print output:\n")
print(prices)

print("\nTable output below:\n")
prices.to_frame(name="Items").to_html()
</textarea>

<br>
<button onclick="runCode()">▶ Run Code</button>

<h4>Output</h4>
<div id="output">Loading Python...</div>

<script>
let pyodide;

// ✅ AUTO RESIZE (FIXED VERSION)
function autoResize(textarea) {
  textarea.style.height = "auto";
  requestAnimationFrame(() => {
    textarea.style.height = textarea.scrollHeight + "px";
  });
}

// ✅ INIT
async function init() {
  pyodide = await loadPyodide();

  document.getElementById("output").textContent = "✅ Python Ready!";

  const textarea = document.getElementById("code");

  // ✅ FIX: run twice to ensure correct height
  autoResize(textarea);
  setTimeout(() => autoResize(textarea), 50);

  textarea.addEventListener("input", function () {
    autoResize(this);
  });
}
init();

// ✅ LOAD PACKAGES
async function loadPackages(code) {
  let output = document.getElementById("output");

  if (code.includes("pandas") && !pyodide.loadedPackages["pandas"]) {
    output.textContent = "Loading pandas...";
    await pyodide.loadPackage("pandas");
  }
}

// ✅ RUN CODE
async function runCode() {
  let output = document.getElementById("output");
  let code = document.getElementById("code").value;

  output.textContent = "Preparing environment...";

  try {
    await loadPackages(code);

    // ✅ Capture print()
    pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

    // ✅ Run user code
    let result = await pyodide.runPythonAsync(code);

    // ✅ Get print output
    let printed = pyodide.runPython("sys.stdout.getvalue()");

    // ✅ Detect HTML (for tables)
    if (result && result.toString().trim().startsWith("<")) {
      output.innerHTML = printed + result;
    } else {
      output.textContent = printed;
    }

  } catch (err) {
    output.textContent = "❌ Error:\\n" + err;
  }
}
</script>

</body>
</html>
